<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  <script>
     function sumRest(name,...args){//rest operator while declaring function
            document.write(`Hey my name is ${name}:`);
             let sum =1;
             for(let i in args){
                sum +=args[i];
             }
             document.write(sum + "<br>")

        }
        var arr =[20,80,90];
        sumRest("Aditya",...arr);//spread operator used while function call
  </script>  
</body>
</html>
