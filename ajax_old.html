<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajax Demo</title>
</head>
<body>

    <h2>Ajax Load Local Data</h2>

    <button onclick="loadText()">Load Text file</button>
    <button onclick="loadJSON()">Load JSON file</button>

    <pre id="ajaxData">Click button to load data</pre>

    <script>
        function loadText() {
            var xhr = new XMLHttpRequest();

            xhr.open("GET", "file.txt", true);

            xhr.onload = function () {
                if (this.status == 200) {
                    document.getElementById("ajaxData").innerText = this.responseText;
                }
            };

            xhr.send();
        }

        function loadJSON() {
            var xhr = new XMLHttpRequest();

            xhr.open("GET", "data.json", true);

            xhr.onload = function () {
                if (this.status === 200) {
                    let data = JSON.parse(this.responseText);
                    let formatted = JSON.stringify(data, null, 2);

                    document.getElementById("ajaxData").innerText = formatted;
                }
            };

            xhr.send();
        }
    </script>

</body>
</html>
